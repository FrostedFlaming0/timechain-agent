<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Timechain Agent</title>
  <style>
    :root {
      --bg: #fafaf7;
      --panel: #ffffff;
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --line: #e5e5e0;
      --accent: #2d5d4f;
      --you: #f0ebe0;
      --agent: #ffffff;
      --warn: #b15a3a;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 320px;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "header header"
        "main   side"
        "input  side";
    }
    header {
      grid-area: header;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }
    header strong { color: var(--ink); }
    header .meta { font-family: var(--mono); }
    header button {
      background: none; border: 1px solid var(--line);
      padding: 4px 10px; border-radius: 4px; cursor: pointer;
      color: var(--ink); font-size: 12px;
    }
    header button:hover { background: var(--bg); }

    main {
      grid-area: main;
      overflow-y: auto;
      padding: 20px 18px;
    }
    .turn {
      max-width: 760px;
      margin: 0 auto 14px;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .turn.you { background: var(--you); }
    .turn.agent { background: var(--agent); border: 1px solid var(--line); }
    .turn.system {
      background: transparent;
      border: 1px dashed var(--line);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .turn.error {
      background: #fbecec; border: 1px solid #e0b0b0;
      color: #7a2a2a; font-family: var(--mono); font-size: 12px;
    }
    .turn .role {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--muted); margin-bottom: 4px;
    }
    .turn img.attach {
      max-width: 360px; max-height: 300px;
      border: 1px solid var(--line); border-radius: 4px;
      margin: 8px 0;
      display: block;
    }
    .turn .file-meta {
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      margin-top: 4px;
    }

    .input-row {
      grid-area: input;
      padding: 12px 18px 16px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    .composer {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      resize: none;
      min-height: 40px;
      max-height: 200px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.4;
      background: var(--bg);
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button.send {
      padding: 10px 16px;
      border: none; border-radius: 6px;
      background: var(--accent); color: white;
      font-size: 14px; cursor: pointer;
    }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; }
    button.attach {
      padding: 10px 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      border-radius: 6px;
      cursor: pointer;
    }
    .hint {
      max-width: 760px; margin: 6px auto 0;
      font-size: 11px; color: var(--muted);
      font-family: var(--mono);
    }

    aside {
      grid-area: side;
      border-left: 1px solid var(--line);
      background: var(--panel);
      overflow-y: auto;
      padding: 14px;
      font-size: 13px;
    }
    aside h3 {
      margin: 0 0 8px; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted);
    }
    aside .item {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 8px;
      cursor: default;
    }
    aside .item .idx {
      font-family: var(--mono); color: var(--muted); font-size: 11px;
    }
    aside .item .body { margin-top: 4px; line-height: 1.4; }
    aside .item.revision { border-left: 3px solid var(--warn); }
    aside .item.reflection { border-left: 3px solid var(--accent); }
    aside section { margin-bottom: 18px; }

    .typing-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
      30%           { opacity: 1.0; transform: translateY(-4px); }
    }

    .dragover {
      outline: 3px dashed var(--accent);
      outline-offset: -8px;
    }

    .takeover-banner {
      background: #fff3d6; border-bottom: 1px solid #e0c870;
      padding: 8px 16px; text-align: center; font-size: 13px;
    }
    .takeover-banner button {
      margin-left: 10px; padding: 4px 12px;
      background: var(--accent); color: white;
      border: none; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div><strong>timechain agent</strong> &middot; <span id="status">connecting...</span></div>
    <div>
      <span class="meta" id="chainmeta"></span>
      <button id="verifybtn" title="cryptographically verify the chain">verify</button>
    </div>
  </header>

  <main id="main">
    <!-- messages render here -->
  </main>

  <aside>
    <section id="reflections-section">
      <h3>recent reflections</h3>
      <div id="reflections"></div>
    </section>
    <section id="revisions-section">
      <h3>standing revisions</h3>
      <div id="revisions"></div>
    </section>
  </aside>

  <div class="input-row">
    <div class="composer">
      <button class="attach" id="attachbtn" title="attach a file">+</button>
      <input type="file" id="fileinput" style="display:none" />
      <textarea id="composer" placeholder="message... (or /command)" rows="1"></textarea>
      <button class="send" id="sendbtn">send</button>
    </div>
    <div class="hint">enter to send, shift+enter for newline. drag files anywhere to ingest. /verify /reflect /seal /sysprompt /length /revise N text /file path</div>
  </div>

<script>
// =========================================================================
// State
// =========================================================================
let SESSION = null;
let SENDING = false;
const main = document.getElementById('main');
const composer = document.getElementById('composer');
const sendbtn = document.getElementById('sendbtn');
const attachbtn = document.getElementById('attachbtn');
const fileinput = document.getElementById('fileinput');
const statusEl = document.getElementById('status');
const chainmetaEl = document.getElementById('chainmeta');
const verifybtn = document.getElementById('verifybtn');

// =========================================================================
// Session — claim on load, supports take-over from another tab
// =========================================================================
async function claimSession() {
  const r = await fetch('/api/session/claim', { method: 'POST' });
  const data = await r.json();
  SESSION = data.session_token;
  statusEl.textContent = 'connected';
}

// =========================================================================
// Rendering
// =========================================================================
function addTurn(role, text, opts={}) {
  const div = document.createElement('div');
  div.className = 'turn ' + role;
  if (opts.id) div.id = opts.id;
  if (role !== 'system' && role !== 'error') {
    const r = document.createElement('div');
    r.className = 'role';
    r.textContent = role === 'you' ? 'you' : 'agent';
    div.appendChild(r);
  }
  const body = document.createElement('div');
  body.className = 'body';
  body.textContent = text;
  div.appendChild(body);
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
  return body;  // so streaming can append
}

function addFileTurn(rec) {
  const div = document.createElement('div');
  div.className = 'turn you';
  const r = document.createElement('div');
  r.className = 'role'; r.textContent = 'you (uploaded)';
  div.appendChild(r);
  const c = rec.content;
  if (c.kind === 'image') {
    const img = document.createElement('img');
    img.className = 'attach';
    img.src = '/blobs/' + c.blob_sha256;
    img.alt = c.filename;
    div.appendChild(img);
  }
  const meta = document.createElement('div');
  meta.className = 'file-meta';
  meta.textContent = `${c.filename} — ${c.kind}, ${c.size_bytes.toLocaleString()} bytes, sha256 ${c.blob_sha256.slice(0,12)}…`;
  div.appendChild(meta);
  main.appendChild(div);
  main.scrollTop = main.scrollHeight;
}

function addSystemTurn(text) { return addTurn('system', text); }
function addErrorTurn(text)  { return addTurn('error', text); }

// =========================================================================
// Chain status + sidebar
// =========================================================================
async function refreshStatus() {
  try {
    const r = await fetch('/api/chain/status');
    const d = await r.json();
    chainmetaEl.textContent = `${d.length} records · ${d.pubkey.slice(0,12)}… · ${d.llm_provider}`;
  } catch (e) {
    chainmetaEl.textContent = 'status unavailable';
  }
}

async function refreshSidebar() {
  try {
    const r = await fetch('/api/chain/sidebar');
    const d = await r.json();
    const reflEl = document.getElementById('reflections');
    const revEl = document.getElementById('revisions');
    reflEl.innerHTML = ''; revEl.innerHTML = '';

    // Most recent first
    const refs = [...d.reflections].sort((a,b) => b.index - a.index).slice(0, 5);
    if (refs.length === 0) {
      reflEl.innerHTML = '<div style="color:var(--muted);font-size:12px">none yet</div>';
    }
    refs.forEach(r => {
      const item = document.createElement('div');
      item.className = 'item reflection';
      const idx = document.createElement('div');
      idx.className = 'idx';
      idx.textContent = `#${r.index} · ${formatRelative(r.timestamp)}`;
      const body = document.createElement('div');
      body.className = 'body';
      const text = (r.content.text || '').slice(0, 240);
      body.textContent = text + (r.content.text && r.content.text.length > 240 ? '…' : '');
      item.appendChild(idx); item.appendChild(body);
      reflEl.appendChild(item);
    });

    const revs = [...d.revisions].sort((a,b) => b.index - a.index).slice(0, 8);
    if (revs.length === 0) {
      revEl.innerHTML = '<div style="color:var(--muted);font-size:12px">none yet</div>';
    }
    revs.forEach(r => {
      const item = document.createElement('div');
      item.className = 'item revision';
      const idx = document.createElement('div');
      idx.className = 'idx';
      idx.textContent = `#${r.index} corrects #${r.content.revises_index} · ${formatRelative(r.timestamp)}`;
      const body = document.createElement('div');
      body.className = 'body';
      body.textContent = r.content.text || '';
      item.appendChild(idx); item.appendChild(body);
      revEl.appendChild(item);
    });
  } catch (e) {
    // Ignore — sidebar is best-effort.
  }
}

function formatRelative(timestamp_ms) {
  const s = Math.floor((Date.now() - timestamp_ms) / 1000);
  if (s < 60)    return 'just now';
  if (s < 3600)  return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

// =========================================================================
// Sending — slash commands vs. turns
// =========================================================================
function sessionHeaders(extra={}) {
  return { 'content-type': 'application/json', 'x-session-token': SESSION, ...extra };
}

async function send() {
  if (SENDING) return;
  const text = composer.value.trim();
  if (!text) return;
  composer.value = '';
  composer.style.height = 'auto';
  SENDING = true;
  sendbtn.disabled = true;

  try {
    if (text.startsWith('/')) {
      addTurn('you', text);
      await runCommand(text);
    } else {
      addTurn('you', text);
      await runTurn(text);
    }
  } finally {
    SENDING = false;
    sendbtn.disabled = false;
    refreshStatus();
    refreshSidebar();
  }
}

async function runCommand(cmd) {
  try {
    const r = await fetch('/api/command', {
      method: 'POST',
      headers: sessionHeaders(),
      body: JSON.stringify({ command: cmd }),
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      addErrorTurn(`command failed: ${err.detail?.message || err.detail || r.statusText}`);
      return;
    }
    const d = await r.json();
    renderCommandResult(d);
  } catch (e) {
    addErrorTurn(`command failed: ${e.message}`);
  }
}

function renderCommandResult(d) {
  if (d.kind === 'verify') {
    addSystemTurn(`verify: ${d.ok ? 'OK' : 'FAIL'} — ${d.message}`);
  } else if (d.kind === 'length') {
    addSystemTurn(`chain length: ${d.length} records`);
  } else if (d.kind === 'seal') {
    if (!d.batch) addSystemTurn('seal: no un-batched records');
    else addSystemTurn(`sealed batch ${d.batch.batch_id}: records ${d.batch.first_idx}–${d.batch.last_idx}, root ${d.batch.root_hash.slice(0,16)}…`);
  } else if (d.kind === 'sysprompt') {
    if (d.entries.length === 0) addSystemTurn('no system prompt records on chain yet');
    else {
      const lines = d.entries.map(e =>
        `  #${e.index}: ${(e.text || '').slice(0,120).replace(/\n/g,' ')}${e.text.length > 120 ? '…' : ''}`
      );
      addSystemTurn(`${d.entries.length} system prompt record(s):\n${lines.join('\n')}`);
    }
  } else if (d.kind === 'reflect') {
    if (d.result === 'not_enough_history') addSystemTurn('reflect: not enough history yet');
    else addSystemTurn(`reflection committed at #${d.record.index}:\n\n${d.record.content.text}`);
  } else if (d.kind === 'revise') {
    if (d.result === 'no_such_record') addErrorTurn(`no record at index ${d.target}`);
    else addSystemTurn(`revision at #${d.record.index} corrects #${d.target_index}`);
  } else if (d.kind === 'file') {
    addFileTurn(d.record);
  } else {
    addSystemTurn(JSON.stringify(d));
  }
}

async function runTurn(text) {
  // Use SSE for streaming. EventSource doesn't support custom headers, so
  // we pass the session token in the query string for this endpoint only.
  const url = `/api/turn/stream?input=${encodeURIComponent(text)}&session=${encodeURIComponent(SESSION)}`;
  const agentBody = addTurn('agent', '');

  // Show three-dot indicator immediately so the user sees feedback during
  // the latency before the first token arrives. The indicator lives inside
  // agentBody as a child node we can swap out, so we don't disturb the
  // turn div's structure (role label etc.) when the first token lands.
  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  agentBody.appendChild(indicator);
  main.scrollTop = main.scrollHeight;

  let buffer = '';
  let firstTokenSeen = false;

  return new Promise((resolve) => {
    const es = new EventSource(url);
    es.addEventListener('observation', () => { /* could show "thinking" */ });
    es.addEventListener('token', (ev) => {
      try {
        const d = JSON.parse(ev.data);
        // Replace the indicator with the actual text on the first chunk.
        if (!firstTokenSeen) {
          agentBody.textContent = '';  // clears the indicator div
          firstTokenSeen = true;
        }
        buffer += d.text;
        agentBody.textContent = buffer;
        main.scrollTop = main.scrollHeight;
      } catch (e) {}
    });
    es.addEventListener('reflection', () => {
      addSystemTurn('[auto-reflection committed]');
    });
    es.addEventListener('error', (ev) => {
      // EventSource fires generic 'error' on stream end too; only surface
      // if we got a real error message.
      try {
        const d = JSON.parse(ev.data);
        if (d?.message) {
          if (!firstTokenSeen) agentBody.textContent = '';
          addErrorTurn(`stream error: ${d.message}`);
        }
      } catch (e) {}
    });
    es.addEventListener('done', () => {
      // If the stream finished without a single token (rare — empty response),
      // clean up the indicator so the user isn't left staring at dancing dots.
      if (!firstTokenSeen) agentBody.textContent = '(no response)';
      es.close();
      resolve();
    });
    // Safety: if the stream just closes, resolve anyway.
    es.onerror = () => {
      // Real network error — close and resolve so the UI unblocks.
      if (es.readyState === EventSource.CLOSED) {
        if (!firstTokenSeen) {
          agentBody.textContent = '';
          addErrorTurn('connection closed before any tokens received');
        }
        resolve();
      }
    };
  });
}

// =========================================================================
// File upload
// =========================================================================
async function uploadFile(file) {
  const fd = new FormData();
  fd.append('file', file);
  addSystemTurn(`uploading ${file.name}…`);
  try {
    const r = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'x-session-token': SESSION },
      body: fd,
    });
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      addErrorTurn(`upload failed: ${err.detail || r.statusText}`);
      return;
    }
    const d = await r.json();
    addFileTurn(d.record);
    refreshSidebar();
  } catch (e) {
    addErrorTurn(`upload failed: ${e.message}`);
  }
}

// =========================================================================
// Wiring
// =========================================================================
sendbtn.addEventListener('click', send);
composer.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault(); send();
  }
});
composer.addEventListener('input', () => {
  composer.style.height = 'auto';
  composer.style.height = Math.min(200, composer.scrollHeight) + 'px';
});
attachbtn.addEventListener('click', () => fileinput.click());
fileinput.addEventListener('change', (e) => {
  if (e.target.files[0]) uploadFile(e.target.files[0]);
  e.target.value = '';
});
verifybtn.addEventListener('click', async () => {
  addTurn('you', '/verify');
  await runCommand('/verify');
});

// Drag-and-drop anywhere on the page
['dragenter', 'dragover'].forEach(ev =>
  document.addEventListener(ev, (e) => {
    e.preventDefault(); document.body.classList.add('dragover');
  })
);
['dragleave', 'drop'].forEach(ev =>
  document.addEventListener(ev, (e) => {
    e.preventDefault();
    if (ev === 'dragleave' && e.relatedTarget) return;
    document.body.classList.remove('dragover');
  })
);
document.addEventListener('drop', (e) => {
  e.preventDefault();
  document.body.classList.remove('dragover');
  if (e.dataTransfer?.files?.length) uploadFile(e.dataTransfer.files[0]);
});

// =========================================================================
// Boot
// =========================================================================
(async () => {
  await claimSession();
  await refreshStatus();
  await refreshSidebar();
  // Periodic sidebar refresh (cheap; reflections/revisions don't change often)
  setInterval(refreshSidebar, 30_000);
})();
</script>
</body>
</html>
