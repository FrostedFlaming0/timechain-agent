name: tests

# Run the full test suite on every push and pull request. Catching
# regressions matters here in particular because several of the more
# subtle bugs caught in review (cross-process embedder determinism,
# escalation idempotence, declined-proposal dedup) are exactly the kind
# a future contributor could re-introduce.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.10 is the floor — uses `list[T]` / `tuple[T, ...]` generics
        # without `from __future__ import annotations` at the use site,
        # which lower versions reject at runtime in some contexts. 3.12
        # is the current stable; 3.13 catches deprecation warnings
        # early.
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install the core hard deps. Optional deps (file ingest,
          # web UI) are not required by the tests proper, but pytest
          # itself is needed for the parametrized tests.
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: pytest test_timechain.py -v

      - name: Run custom harness (parity check)
        # `run_tests.py` is the no-pytest fallback. Keep both runners
        # green: if the harness diverges from pytest, CI catches it.
        run: python run_tests.py
